<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Account - Fun Travels</title>
  <link rel="icon" href="images/icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="account-page">
  <header class="header">
    <div class="top">
      <div class="brand">
        <img src="images/icon.png" alt="Fun Travels Logo" />
        <span>Fun Travels</span>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="mybookings.html">My Bookings</a>
        <a href="myaccount.html" class="active">Account</a>
      </nav>
    </div>
  </header>

  <section class="page-wrap">
    <div class="container account-layout">

      <!-- Profile Card -->
      <div class="account-card" style="background:var(--gradient-dark);color:white;padding:28px;">
        <div style="display:flex;align-items:center;gap:18px;margin-bottom:20px">
          <div style="
            width:64px;height:64px;border-radius:50%;
            background:rgba(255,255,255,0.15);
            display:flex;align-items:center;justify-content:center;
            font-size:28px;border:2px solid rgba(255,255,255,0.25)
          " id="avatarIcon">👤</div>
          <div>
            <h1 class="page-title" style="color:white;margin-bottom:4px;" id="accName">Loading...</h1>
            <div style="color:rgba(255,255,255,0.75);font-size:14px">Fun Travels Member</div>
          </div>
        </div>

        <div class="ticket-grid">
          <div class="ticket-item" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12)">
            <span style="color:rgba(255,255,255,0.65)">Phone</span>
            <strong style="color:white" id="accPhone">-</strong>
          </div>
          <div class="ticket-item" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12)">
            <span style="color:rgba(255,255,255,0.65)">Email</span>
            <strong style="color:white" id="accEmail">-</strong>
          </div>
          <div class="ticket-item" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12)">
            <span style="color:rgba(255,255,255,0.65)">Status</span>
            <strong style="color:#86efac">✓ Logged In</strong>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="account-card" style="padding:28px">
        <h2 class="page-title" style="font-size:22px;margin-bottom:18px">Quick Actions</h2>
        <div class="actions">
          <a href="mybookings.html" class="btn btn-primary">🎫 My Bookings</a>
          <a href="index.html" class="btn btn-light">🔍 Book Ticket</a>
          <button class="btn btn-dark" id="logoutBtn">🚪 Logout</button>
        </div>
      </div>

      <!-- Recent Bookings preview -->
      <div class="account-card" style="padding:28px">
        <h2 class="page-title" style="font-size:22px;margin-bottom:6px">Recent Trips</h2>
        <div class="page-sub">Your last 3 bookings</div>
        <div id="recentBookings">
          <div style="text-align:center;padding:24px;color:var(--text-light)">
            Loading recent trips...
          </div>
        </div>
        <div style="margin-top:14px">
          <a href="mybookings.html" class="btn btn-light" style="width:100%;justify-content:center">
            View All Bookings →
          </a>
        </div>
      </div>

    </div>
  </section>

  <!-- Bottom Nav -->
  <div class="bottom-nav-fixed">
    <div class="bottom-nav-container">
      <button class="nav-fixed-item" onclick="location.href='index.html'">
        <span class="nav-fixed-icon">🏠</span><span>Home</span>
      </button>
      <button class="nav-fixed-item" onclick="location.href='mybookings.html'">
        <span class="nav-fixed-icon">🎫</span><span>Bookings</span>
      </button>
      <button class="nav-fixed-item" onclick="location.href='index.html#contact'">
        <span class="nav-fixed-icon">❓</span><span>Help</span>
      </button>
      <button class="nav-fixed-item active">
        <span class="nav-fixed-icon">👤</span><span>Account</span>
      </button>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:5000/api";

    // ── Load user safely ─────────────────────────────────────────────────
    let user = {};
    try {
      user = JSON.parse(localStorage.getItem("ft_user") || "{}");
    } catch (e) {
      user = {};
    }

    // ── Redirect if not logged in ────────────────────────────────────────
    if (!user.isLoggedIn) {
      location.href = "login.html";
    }

    // ── Populate profile ─────────────────────────────────────────────────
    const nameEl  = document.getElementById("accName");
    const phoneEl = document.getElementById("accPhone");
    const emailEl = document.getElementById("accEmail");
    const avatar  = document.getElementById("avatarIcon");

    if (nameEl)  nameEl.textContent  = user.name  || "Traveller";
    if (phoneEl) phoneEl.textContent = user.phone || "Not set";
    if (emailEl) emailEl.textContent = user.email || "Not set";

    // Show first letter as avatar
    if (avatar && user.name) {
      const letter = user.name.charAt(0).toUpperCase();
      avatar.textContent = letter;
      avatar.style.fontSize = "28px";
      avatar.style.fontWeight = "900";
      avatar.style.color = "#fff";
    }

    // ── Logout ────────────────────────────────────────────────────────────
    document.getElementById("logoutBtn").addEventListener("click", () => {
      if (!confirm("Are you sure you want to logout?")) return;
      localStorage.removeItem("ft_user");
      localStorage.removeItem("ft_booking_draft");
      location.href = "index.html";
    });

    // ── Load recent bookings ─────────────────────────────────────────────
    async function loadRecentBookings() {
      const el = document.getElementById("recentBookings");
      if (!el || !user.phone) {
        if (el) el.innerHTML = `
          <div style="text-align:center;padding:20px;color:var(--text-light)">
            No phone number on file.
          </div>`;
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/bookings?phone=${encodeURIComponent(user.phone)}`);
        const data = await res.json();

        if (!res.ok || !Array.isArray(data) || !data.length) {
          el.innerHTML = `
            <div style="text-align:center;padding:20px;color:var(--text-light)">
              No trips yet. <a href="index.html" style="color:var(--primary);font-weight:700">Book your first one!</a>
            </div>`;
          return;
        }

        const recent = data.slice(0, 3);
        el.innerHTML = recent.map(b => `
          <div style="
            display:flex;justify-content:space-between;align-items:center;
            padding:12px 14px;border-radius:14px;background:#f8fafc;
            border:1px solid var(--line);margin-bottom:10px
          ">
            <div>
              <strong>${b.from || "-"} → ${b.to || "-"}</strong>
              <div style="font-size:12px;color:var(--text-light);margin-top:3px">
                ${b.date || ""} &bull; ${b.operator || ""}
              </div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:800">₹${b.grandTotal || 0}</div>
              <div style="font-size:11px;font-weight:700;color:${
                b.status === "CONFIRMED" ? "#16a34a" : "#dc2626"
              }">${b.status}</div>
            </div>
          </div>
        `).join("");
      } catch (err) {
        el.innerHTML = `
          <div style="text-align:center;padding:20px;color:var(--text-light)">
            Could not load trips (backend offline).
          </div>`;
      }
    }

    loadRecentBookings();
  </script>
</body>
</html>
