<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Fun Travels</title>
  <link rel="icon" href="images/icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page" class="login-bg">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <img src="images/icon.png" alt="Fun Travels Logo" />
        <span>Fun Travels</span>
      </div>

      <h1 class="page-title" style="text-align:center;">Login with OTP</h1>
      <div class="page-sub" style="text-align:center;">Continue before viewing available buses</div>

      <div class="trip-box">
        <strong>Your Trip</strong>
        <p id="tripText">Loading trip details...</p>
      </div>

      <form id="loginForm" class="form-grid">
        <div class="field">
          <label for="nameInput">NAME</label>
          <input type="text" id="nameInput" placeholder="Enter your name" required />
        </div>

        <div class="field">
          <label for="phoneInput">MOBILE NUMBER</label>
          <div style="display:flex; gap:10px;">
            <input type="tel" id="phoneInput" placeholder="Enter 10-digit mobile number" maxlength="10" required style="flex:1;" />
            <button type="button" class="btn btn-dark" id="sendOtpBtn" style="padding:0 16px; min-width:110px; border-radius:16px;">Send OTP</button>
          </div>
          <div id="statusMsg" class="note"></div>
          <div id="countdown" class="note"></div>
        </div>

        <div class="field otp-box" id="otpBox">
          <label for="otpInput">ENTER OTP</label>
          <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6" inputmode="numeric" />
        </div>

        <button type="submit" class="btn btn-primary" id="verifyBtn">Verify OTP &amp; Continue</button>
      </form>

      <div id="errorMsg" class="note" style="color:#dc2626; text-align:center; margin-top:10px;"></div>

      <div class="helper">Safe login &bull; Fast booking &bull; Instant confirmation</div>
      <a href="index.html" class="back-link">&#8592; Back to search</a>

      <div class="demo-note">
        Demo OTP flow &mdash; OTP will be shown in an alert for testing purposes.
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:5000/api";

    const tripText    = document.getElementById("tripText");
    const loginForm   = document.getElementById("loginForm");
    const sendOtpBtn  = document.getElementById("sendOtpBtn");
    const otpBox      = document.getElementById("otpBox");
    const otpInput    = document.getElementById("otpInput");
    const phoneInput  = document.getElementById("phoneInput");
    const nameInput   = document.getElementById("nameInput");
    const statusMsg   = document.getElementById("statusMsg");
    const countdown   = document.getElementById("countdown");
    const verifyBtn   = document.getElementById("verifyBtn");
    const errorMsg    = document.getElementById("errorMsg");

    let trip = {};
    try { trip = JSON.parse(localStorage.getItem("ft_search")) || {}; } catch { trip = {}; }

    const redirectPage = localStorage.getItem("ft_redirect_after_login") || "results.html";

    let generatedOtp  = "";
    let otpExpiresAt  = 0;
    let timer         = null;

    // Check if already logged in
    try {
      const existing = JSON.parse(localStorage.getItem("ft_user") || "{}");
      if (existing.isLoggedIn) {
        location.href = redirectPage;
      }
    } catch { /* ignore */ }

    tripText.textContent = (trip.from && trip.to && trip.date)
      ? `${trip.from} \u2192 ${trip.to} | ${trip.date}`
      : "No trip selected yet";

    function setError(msg) {
      errorMsg.textContent = msg || "";
    }

    function startTimer(seconds) {
      clearInterval(timer);
      otpExpiresAt = Date.now() + seconds * 1000;
      timer = setInterval(() => {
        const remaining = Math.max(0, Math.floor((otpExpiresAt - Date.now()) / 1000));
        if (remaining > 0) {
          countdown.textContent = "OTP valid for " + remaining + "s";
        } else {
          countdown.textContent = "OTP expired. Please resend OTP.";
          clearInterval(timer);
        }
      }, 1000);
    }

    async function loginUser(name, phone) {
      try {
        const response = await fetch(`${API_BASE}/users/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, phone, email: "" })
        });

        let data = {};
        try { data = await response.json(); } catch { /* ignore */ }

        if (!response.ok) {
          throw new Error(data.message || "Server error " + response.status);
        }

        localStorage.setItem("ft_user", JSON.stringify({
          _id:       data.user?._id   || "",
          name:      data.user?.name  || name,
          phone:     data.user?.phone || phone,
          email:     data.user?.email || "",
          isLoggedIn: true
        }));

        return true;
      } catch (err) {
        setError("Login failed: " + err.message);
        return false;
      }
    }

    sendOtpBtn.addEventListener("click", () => {
      setError("");
      const name  = nameInput.value.trim();
      const phone = phoneInput.value.trim();

      if (name.length < 2) {
        setError("Please enter your name (min 2 characters)");
        nameInput.focus();
        return;
      }
      if (!/^\d{10}$/.test(phone)) {
        setError("Please enter a valid 10-digit phone number");
        phoneInput.focus();
        return;
      }

      generatedOtp = String(Math.floor(100000 + Math.random() * 900000));
      otpBox.classList.add("show");
      statusMsg.textContent = "OTP sent successfully";
      sendOtpBtn.textContent = "Resend OTP";
      startTimer(60);

      // In production replace this alert with real SMS API
      alert("Demo OTP: " + generatedOtp);
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      setError("");

      const name       = nameInput.value.trim();
      const phone      = phoneInput.value.trim();
      const enteredOtp = otpInput.value.trim();

      if (name.length < 2) {
        setError("Please enter your name");
        return;
      }
      if (!/^\d{10}$/.test(phone)) {
        setError("Please enter a valid 10-digit phone number");
        return;
      }
      if (!generatedOtp) {
        setError("Please send OTP first");
        return;
      }
      if (Date.now() > otpExpiresAt) {
        setError("OTP expired. Please resend OTP.");
        return;
      }
      if (enteredOtp !== generatedOtp) {
        setError("Incorrect OTP. Please try again.");
        return;
      }

      verifyBtn.textContent = "Verifying...";
      verifyBtn.disabled = true;

      const ok = await loginUser(name, phone);

      verifyBtn.textContent = "Verify OTP & Continue";
      verifyBtn.disabled = false;

      if (ok) {
        generatedOtp = "";
        clearInterval(timer);
        location.href = redirectPage;
      }
    });
  </script>
</body>
</html>
